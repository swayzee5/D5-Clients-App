plugins {
    id 'com.android.application'
}

android {
    namespace 'com.d5coaching.clients'
    compileSdk 34

    defaultConfig {
        applicationId 'com.d5coaching.clients'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
