name: Build and Deploy Android AAB

on:
  push:
    branches: [claude/android-twa, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/d5coaching.keystore

      - name: Generate launcher icons
        run: |
          pip install Pillow --quiet
          python3 - <<'PYEOF'
import urllib.request, os, io
from PIL import Image

logo_url = "https://raw.githubusercontent.com/swayzee5/D5-Clients-App/claude/android-twa/Logo%20D5%20App.jpeg"
with urllib.request.urlopen(logo_url) as r:
    logo_data = r.read()

img = Image.open(io.BytesIO(logo_data)).convert("RGBA")
w, h = img.size
s = min(w, h)
img = img.crop(((w-s)//2, (h-s)//2, (w+s)//2, (h+s)//2))

sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
for dpi, size in sizes.items():
    d = f'android/app/src/main/res/mipmap-{dpi}'
    os.makedirs(d, exist_ok=True)
    resized = img.resize((size, size), Image.LANCZOS).convert("RGB")
    resized.save(f'{d}/ic_launcher.png', 'PNG')
    resized.save(f'{d}/ic_launcher_round.png', 'PNG')
print('Real D5 logo icons generated successfully')
PYEOF

      - name: Create proguard-rules.pro
        run: |
          cat > android/app/proguard-rules.pro << 'EOF'
          # Add project specific ProGuard rules here.
          -keep class com.d5coaching.clients.** { *; }
          EOF

      - name: Build Release AAB
        working-directory: android
        env:
          KEYSTORE_PATH: d5coaching.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: D5Coaching-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Setup Ruby and Install Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install Fastlane gem
        run: gem install fastlane multi_json

      - name: Deploy to Google Play Internal Track
        continue-on-error: true
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > /tmp/supply_key.json
          fastlane supply \
            --aab android/app/build/outputs/bundle/release/app-release.aab \
            --package_name com.d5coaching.clients \
            --track internal \
            --json_key /tmp/supply_key.json \
            --skip_upload_apk true \
            --skip_upload_metadata true \
            --skip_upload_screenshots true \
            --skip_upload_images true
