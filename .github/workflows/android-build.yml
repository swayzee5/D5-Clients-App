name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          sudo ln -s /opt/gradle-8.6/bin/gradle /usr/local/bin/gradle

      - name: Generate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version=8.6 --distribution-type=bin
          chmod +x gradlew

      - name: Setup signing keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo ">>> Using saved keystore from KEYSTORE_BASE64 secret"
            echo "$KEYSTORE_B64" | base64 -d > android/keystore.jks
          else
            echo ">>> No secret found - generating new keystore"
            keytool -genkeypair -v \
              -keystore android/keystore.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias d5coaching \
              -storepass d5coaching2024 \
              -keypass d5coaching2024 \
              -dname "CN=D5 Coaching, OU=Mobile, O=D5Coaching, L=Paris, S=IDF, C=FR"
            echo ""
            echo "========== COPY THIS AS GITHUB SECRET KEYSTORE_BASE64 =========="
            base64 -w 0 android/keystore.jks
            echo ""
            echo "================================================================="
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Upload keystore artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: android/keystore.jks
          retention-days: 30

      - name: Generate launcher icons
        run: |
          pip install pillow -q
          python3 - <<'EOF'
          from PIL import Image, ImageDraw, ImageFont
          import os

          def make_icon(size):
              img = Image.new('RGB', (size, size), (255, 193, 7))
              draw = ImageDraw.Draw(img)

              # Rounded corners mask
              mask = Image.new('L', (size, size), 0)
              mask_draw = ImageDraw.Draw(mask)
              radius = size // 5
              mask_draw.rounded_rectangle([0, 0, size - 1, size - 1], radius=radius, fill=255)

              # Try bold system font
              font_d5 = None
              font_coaching = None
              for font_path in [
                  '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf',
                  '/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf',
                  '/usr/share/fonts/truetype/ubuntu/Ubuntu-B.ttf',
              ]:
                  if os.path.exists(font_path):
                      font_d5 = ImageFont.truetype(font_path, int(size * 0.42))
                      font_coaching = ImageFont.truetype(font_path, int(size * 0.17))
                      break

              if font_d5 is None:
                  font_d5 = ImageFont.load_default()
                  font_coaching = ImageFont.load_default()

              # Draw d5
              bbox = draw.textbbox((0, 0), 'd5', font=font_d5)
              tw = bbox[2] - bbox[0]
              th = bbox[3] - bbox[1]
              draw.text(((size - tw) // 2 - bbox[0], int(size * 0.22) - bbox[1]), 'd5', font=font_d5, fill=(0, 0, 0))

              # Draw coaching
              bbox2 = draw.textbbox((0, 0), 'coaching', font=font_coaching)
              tw2 = bbox2[2] - bbox2[0]
              draw.text(((size - tw2) // 2 - bbox2[0], int(size * 0.72) - bbox2[1]), 'coaching', font=font_coaching, fill=(0, 0, 0))

              # Apply rounded corners
              result = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              result.paste(img, mask=mask)
              final = Image.new('RGB', (size, size), (255, 193, 7))
              final.paste(result, mask=result.split()[3])
              return final

          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          for density, size in sizes.items():
              path = f'android/app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              icon = make_icon(size)
              icon.save(f'{path}/ic_launcher.png')
              icon.save(f'{path}/ic_launcher_round.png')
          print('Icons generated successfully')
          EOF

      - name: Build Signed Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: D5Coaching-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
