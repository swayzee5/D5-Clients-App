name: Build and Deploy Android AAB

on:
  push:
    branches: [claude/android-twa, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/d5coaching.keystore

      - name: Generate launcher icons
        run: |
          python3 - <<'PYEOF'
          import struct, zlib, os

          def make_png(width, height, r, g, b):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xFFFFFFFF
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0))
              raw = b''
              for _ in range(height):
                  raw += b'\x00' + bytes([r, g, b] * width)
              comp = zlib.compress(raw)
              idat = chunk(b'IDAT', comp)
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          for dpi, size in sizes.items():
              d = f'android/app/src/main/res/mipmap-{dpi}'
              os.makedirs(d, exist_ok=True)
              png = make_png(size, size, 255, 106, 0)
              open(f'{d}/ic_launcher.png', 'wb').write(png)
              open(f'{d}/ic_launcher_round.png', 'wb').write(png)
          print('Icons generated successfully')
          PYEOF

      - name: Create proguard-rules.pro
        run: |
          cat > android/app/proguard-rules.pro << 'EOF'
          # Add project specific ProGuard rules here.
          -keep class com.d5coaching.clients.** { *; }
          EOF

      - name: Build Release AAB
        working-directory: android
        env:
          KEYSTORE_PATH: d5coaching.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: D5Coaching-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Setup Ruby and Install Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install Fastlane gem
        run: gem install fastlane

      - name: Deploy to Google Play Internal Track
        continue-on-error: true
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > /tmp/supply_key.json
          fastlane supply \
            --aab android/app/build/outputs/bundle/release/app-release.aab \
            --package_name com.d5coaching.clients \
            --track internal \
            --json_key /tmp/supply_key.json \
            --skip_upload_apk true \
            --skip_upload_metadata true \
            --skip_upload_screenshots true \
            --skip_upload_images true
