name: Build and Deploy Android AAB

on:
  push:
    branches: [claude/android-twa, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/d5coaching.keystore

      - name: Generate launcher icons with Python
        run: |
          python3 - << 'PYEOF'
          import struct, zlib, os

          def make_png(width, height, r, g, b):
              raw = b''
              for y in range(height):
                  row = bytearray()
                  for x in range(width):
                      row += bytes([r, g, b])
                  raw += b'\x00' + bytes(row)
              compressed = zlib.compress(raw, 9)
              def chunk(tag, data):
                  c = tag + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)) +
                      chunk(b'IDAT', compressed) +
                      chunk(b'IEND', b''))

          densities = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          for density, size in densities.items():
              d = f'android/app/src/main/res/mipmap-{density}'
              os.makedirs(d, exist_ok=True)
              png = make_png(size, size, 255, 106, 0)
              with open(f'{d}/ic_launcher.png', 'wb') as f:
                  f.write(png)
              with open(f'{d}/ic_launcher_round.png', 'wb') as f:
                  f.write(png)
              print(f'Generated {density} ({size}x{size})')
          PYEOF

      - name: Create proguard-rules.pro
        run: |
          cat > android/app/proguard-rules.pro << 'EOF'
          -keep class com.google.androidbrowserhelper.** { *; }
          -dontwarn com.google.androidbrowserhelper.**
          EOF

      - name: Build Release AAB
        working-directory: android
        env:
          KEYSTORE_PATH: app/d5coaching.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: D5Coaching-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Setup Ruby and Install Fastlane
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/android-twa'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Fastlane gem
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/android-twa'
        run: gem install fastlane

      - name: Deploy to Google Play Internal Track
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/android-twa'
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > /tmp/supply_key.json
          fastlane supply --aab android/app/build/outputs/bundle/release/app-release.aab --package_name com.d5coaching.clients --track internal --json_key /tmp/supply_key.json --skip_upload_apk true --skip_upload_metadata true --skip_upload_screenshots true --skip_upload_images true
