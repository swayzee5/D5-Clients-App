name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle wrapper
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradlew" \
            -o gradlew
          chmod +x gradlew

      - name: Generate launcher icons
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              mdpi)    size=48  ;;
              hdpi)    size=72  ;;
              xhdpi)   size=96  ;;
              xxhdpi)  size=144 ;;
              xxxhdpi) size=192 ;;
            esac
            dir="android/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"
            convert -size ${size}x${size} xc:"#FFC107" "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
          done

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: D5Coaching-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
