name: Build and Deploy Android AAB

on:
  push:
    branches: [claude/android-twa, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/d5coaching.keystore

      - name: Generate launcher icons
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              mdpi)    size=48  ;;
              hdpi)    size=72  ;;
              xhdpi)   size=96  ;;
              xxhdpi)  size=144 ;;
              xxxhdpi) size=192 ;;
            esac
            dir="android/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"
            convert -size ${size}x${size} xc:"#FF6A00" -fill "#000000" -gravity Center -font Liberation-Sans-Bold -pointsize $((size * 40 / 100)) -annotate 0 "D5" "$dir/ic_launcher.png" 2>/dev/null || convert -size ${size}x${size} xc:"#FF6A00" "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
          done

      - name: Create proguard-rules.pro
        run: |
          printf '-keep class com.google.androidbrowserhelper.** { *; }\n-dontwarn com.google.androidbrowserhelper.**\n' > android/app/proguard-rules.pro

      - name: Build Release AAB
        working-directory: android
        env:
          KEYSTORE_PATH: app/d5coaching.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: D5Coaching-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Setup Ruby and Install Fastlane
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/android-twa'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Fastlane gem
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/android-twa'
        run: gem install fastlane

      - name: Deploy to Google Play Internal Track
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/android-twa'
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > /tmp/supply_key.json
          fastlane supply --aab android/app/build/outputs/bundle/release/app-release.aab --package_name com.d5coaching.clients --track internal --json_key /tmp/supply_key.json --skip_upload_apk true --skip_upload_metadata true --skip_upload_screenshots true --skip_upload_images true
