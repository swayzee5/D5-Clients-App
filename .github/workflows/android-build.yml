name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          sudo ln -s /opt/gradle-8.6/bin/gradle /usr/local/bin/gradle

      - name: Generate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version=8.6 --distribution-type=bin
          chmod +x gradlew

      - name: Setup signing keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo ">>> Using saved keystore from KEYSTORE_BASE64 secret"
            echo "$KEYSTORE_B64" | base64 -d > android/keystore.jks
          else
            echo ">>> No secret found — generating new keystore"
            keytool -genkeypair -v \
              -keystore android/keystore.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias d5coaching \
              -storepass d5coaching2024 \
              -keypass d5coaching2024 \
              -dname "CN=D5 Coaching, OU=Mobile, O=D5Coaching, L=Paris, S=IDF, C=FR"
            echo ""
            echo "========== COPY THIS AS GITHUB SECRET KEYSTORE_BASE64 =========="
            base64 -w 0 android/keystore.jks
            echo ""
            echo "================================================================="
          fi
          echo ">>> Keystore SHA1:"
          keytool -list -keystore android/keystore.jks -alias d5coaching -storepass d5coaching2024 2>/dev/null | grep SHA1
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Upload keystore artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: android/keystore.jks
          retention-days: 90

      - name: Generate launcher icons
        run: |
          python3 - <<'EOF'
          import struct, zlib, os
          def make_png(w, h, r, g, b):
              raw = b''.join(b'\x00' + bytes([r, g, b] * w) for _ in range(h))
              def chunk(t, d):
                  c = zlib.crc32(t + d) & 0xffffffff
                  return struct.pack('>I', len(d)) + t + d + struct.pack('>I', c)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              return (b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) +
                      chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b''))
          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          for density, size in sizes.items():
              path = f'android/app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              data = make_png(size, size, 255, 193, 7)
              open(f'{path}/ic_launcher.png', 'wb').write(data)
              open(f'{path}/ic_launcher_round.png', 'wb').write(data)
          EOF

      - name: Build Signed Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: D5Coaching-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
