name: iOS — Init Certificats (une seule fois)

on:
  workflow_dispatch:

jobs:
  init-certs:
    name: Creer certificats App Store dans d5-certs
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Get ASC Key from d5-certs
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          # Try d5-certs first
          git clone https://${GH_PAT}@github.com/swayzee5/d5-certs.git /tmp/d5-certs 2>&1 | tail -1
          if [ -f /tmp/d5-certs/AuthKey_B32QRB7NPU.p8.b64 ]; then
            echo "Using key from d5-certs"
            cat /tmp/d5-certs/AuthKey_B32QRB7NPU.p8.b64 | tr -d '\n' | base64 -d > /tmp/AuthKey_orig.p8
          elif [ -n "$ASC_KEY_CONTENT" ]; then
            echo "Using ASC_KEY_CONTENT secret"
            printf '%s' "$ASC_KEY_CONTENT" | base64 -d > /tmp/AuthKey_orig.p8
          else
            echo "ERROR: No key available. Run bootstrap-key.yml first!"
            exit 1
          fi
          echo "Key size: $(wc -c < /tmp/AuthKey_orig.p8) bytes"
          # Convert to EC format to fix invalid curve name
          openssl pkcs8 -in /tmp/AuthKey_orig.p8 -nocrypt 2>/dev/null | openssl ec -out /tmp/AuthKey_B32QRB7NPU.p8 2>/dev/null || cp /tmp/AuthKey_orig.p8 /tmp/AuthKey_B32QRB7NPU.p8
          head -1 /tmp/AuthKey_B32QRB7NPU.p8

      - name: Creer et stocker les certificats
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: /tmp/AuthKey_B32QRB7NPU.p8
        run: bundle exec fastlane ios init_certs
