name: Build & Upload iOS — TestFlight

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Raison du build"
        required: false
        default: "Manuel"
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'resources/**'
      - 'capacitor.config.ts'
      - 'package.json'

jobs:
  build-ios:
    name: Build iOS Release
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- Xcode explicite ----
      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install iOS 18 platform
        run: xcodebuild -downloadPlatform iOS || true

      # ---- Fetch logo from main if not on this branch ----
      - name: Ensure D5 icon source exists
        run: |
          if [ ! -f "resources/icon.png" ]; then
            echo "⚠️  resources/icon.png absent de cette branche, récupération depuis main..."
            git fetch origin main
            mkdir -p resources
            git checkout origin/main -- resources/icon.png
            echo "✅ Logo récupéré depuis main"
          else
            echo "✅ Logo trouvé : resources/icon.png"
          fi
          sips -g pixelWidth -g pixelHeight resources/icon.png

      # ---- Node ----
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      # ---- Capacitor iOS ----
      - name: Add iOS platform
        run: |
          if [ ! -d "ios" ] || [ -z "$(ls -A ios 2>/dev/null)" ]; then
            npx cap add ios
          fi

      # ---- App Icons (AVANT cap sync) ----
      - name: Generate all iOS icon sizes from D5 logo
        run: bash scripts/generate-icons.sh

      # ---- Sync Capacitor ----
      - name: Sync Capacitor
        run: npx cap sync ios

      # Restaure les icones si cap sync les a écrasées
      - name: Re-apply icons after cap sync
        run: bash scripts/generate-icons.sh

      # ---- Ruby / Fastlane ----
      - name: Setup Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Fastlane
        run: gem install fastlane --no-document

      # ---- CocoaPods ----
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/App/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      # ---- Ecrire la clé .p8 sur disque (evite le bug altool base64) ----
      - name: Write ASC API key file
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          echo "$ASC_KEY_CONTENT" | base64 -d > /tmp/AuthKey_B32QRB7NPU.p8
          chmod 600 /tmp/AuthKey_B32QRB7NPU.p8

      # ---- Build + TestFlight ----
      - name: Build Release & Upload TestFlight
        env:
          MATCH_GIT_URL:    https://swayzee5:${{ secrets.GH_PAT }}@github.com/swayzee5/d5-certs.git
          MATCH_PASSWORD:   ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID:       ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:    ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: /tmp/AuthKey_B32QRB7NPU.p8
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: fastlane ios beta

      # ---- Artifact ----
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: D5Coaching-IPA
          path: ios/App/build/**/*.ipa
          if-no-files-found: ignore
