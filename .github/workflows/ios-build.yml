name: Build and Upload iOS to TestFlight

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Raison du build"
        required: false
        default: "Manuel"
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'capacitor.config.ts'
      - 'package.json'

jobs:
  build-ios:
    name: Build iOS Release
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Add iOS platform (if missing)
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Setup Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Write .p8 key file
        run: |
          echo "${{ secrets.ASC_KEY_CONTENT }}" | base64 --decode > /tmp/AuthKey_B32QRB7NPU.p8
          echo "Key file written, size: $(wc -c < /tmp/AuthKey_B32QRB7NPU.p8) bytes"

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/App/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      - name: Build Release and Upload to TestFlight
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: /tmp/AuthKey_B32QRB7NPU.p8
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: fastlane ios beta

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: D5Coaching-${{ github.run_number }}.ipa
          path: ios/App/build/**/*.ipa
          retention-days: 30
