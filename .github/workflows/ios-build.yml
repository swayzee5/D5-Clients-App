name: Build & Upload iOS — TestFlight

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Raison du build"
        required: false
        default: "Manuel"
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'resources/**'
      - 'capacitor.config.ts'
      - 'package.json'

jobs:
  build-ios:
    name: Build iOS Release
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install iOS 18 platform
        run: xcodebuild -downloadPlatform iOS || true

      - name: Ensure D5 icon source exists
        run: |
          if [ ! -f "resources/icon.png" ]; then
            git fetch origin main
            mkdir -p resources
            git checkout origin/main -- resources/icon.png
          fi
          sips -g pixelWidth -g pixelHeight resources/icon.png

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Add iOS platform
        run: |
          if [ ! -d "ios" ] || [ -z "$(ls -A ios 2>/dev/null)" ]; then
            npx cap add ios
          fi

      - name: Generate all iOS icon sizes
        run: bash scripts/generate-icons.sh

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Re-apply icons after cap sync
        run: bash scripts/generate-icons.sh

      - name: Setup Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/App/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Write ASC API key file
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          echo "$ASC_KEY_CONTENT" | base64 -d > /tmp/AuthKey_N89NTU664B.p8
          chmod 600 /tmp/AuthKey_N89NTU664B.p8

      # Step 1: install certificates via match
      - name: Install certificates (match)
        env:
          MATCH_GIT_URL:          https://swayzee5:${{ secrets.GH_PAT }}@github.com/swayzee5/d5-certs.git
          MATCH_PASSWORD:         ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_NAME:    fastlane_tmp_keychain
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          ASC_KEY_ID:             ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:          ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH:       /tmp/AuthKey_N89NTU664B.p8
          KEYCHAIN_PASSWORD:      ${{ secrets.KEYCHAIN_PASSWORD }}
        run: fastlane ios certificates

      # Step 2: grant codesign access to keychain (must run AFTER match imports certs)
      - name: Grant codesign keychain access
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/fastlane_tmp_keychain-db"
          echo "Keychains currently in search list:"
          security list-keychains -d user
          echo "Unlocking keychain..."
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "Setting partition list to allow codesign without prompts..."
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          echo "Done. Keys in keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -5

      # Step 3: build and upload
      - name: Build Release & Upload TestFlight
        env:
          MATCH_GIT_URL:          https://swayzee5:${{ secrets.GH_PAT }}@github.com/swayzee5/d5-certs.git
          MATCH_PASSWORD:         ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_NAME:    fastlane_tmp_keychain
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          ASC_KEY_ID:             ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:          ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH:       /tmp/AuthKey_N89NTU664B.p8
          KEYCHAIN_PASSWORD:      ${{ secrets.KEYCHAIN_PASSWORD }}
        run: fastlane ios build_and_upload

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: D5Coaching-IPA
          path: ios/App/build/**/*.ipa
          if-no-files-found: ignore
